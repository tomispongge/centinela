// ▸ DASHBOARD
// ════════════════════════════════════════════════════
function DashboardScreen({ userId }) {
  const [data, setData]     = useState({ objectives: [], incidents: [], evidence: [] });
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    (async () => {
      const [{ data: objs }, { data: inc }, { data: ev }] = await Promise.all([
        sb.from('objectives').select('id, code, name, tasks(id,done)').eq('user_id', userId),
        sb.from('incidents').select('id,title,incident_number,severity,sev_label,status,incident_date').eq('user_id', userId).order('incident_date', { ascending: false }),
        sb.from('evidence').select('id').eq('user_id', userId),
      ]);
      setData({ objectives: objs || [], incidents: inc || [], evidence: ev || [] });
      setLoading(false);
    })();
  }, [userId]);

  if (loading) return <Spinner />;

  const enriched = data.objectives.map(o => {
    const total = o.tasks?.length || 0;
    const done  = o.tasks?.filter(t => t.done).length || 0;
    const progress = total > 0 ? Math.round(done / total * 100) : 0;
    const isComplete = total > 0 && done === total;
    return { ...o, progress, tone: getTone(progress), isComplete };
  });

  // Cumplimiento Global: promedio de todos objetivos
  const globalCompliance = enriched.length > 0 ? Math.round(enriched.reduce((s, o) => s + o.progress, 0) / enriched.length) : 0;
  
  // Cumplimiento Real: basado en completitud de objetivos por eje
  // Ejes 1-4 (COMGES 01-04): 20% c/u si completos
  // Ejes 5-6 (COMGES 05-06): 10% c/u si completos
  const realCompliance = enriched.reduce((acc, o) => {
    const axisNum = parseInt(o.code?.match(/\d+/)?.[0]) || 0;
    if (axisNum >= 1 && axisNum <= 4) {
      return acc + (o.isComplete ? 20 : 0);
    } else if (axisNum >= 5 && axisNum <= 6) {
      return acc + (o.isComplete ? 10 : 0);
    }
    return acc;
  }, 0);

  const openInc     = data.incidents.filter(i => i.status !== 'Resuelto').length;
  const criticalInc = data.incidents.filter(i => i.severity === 'risk' && i.status !== 'Resuelto').length;

  const C = 2 * Math.PI * 70;
  const dashGlobal = C * globalCompliance / 100;
  const dashReal = C * realCompliance / 100;

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
      {/* Row 1 - Two Compliance Rings */}
      <div className="dash-row" style={{ display: 'flex', gap: 18 }}>
        {/* Compliance ring - Global */}
        <div className="dash-ring-card" style={{ ...CARD, flex: 1, display: 'flex', alignItems: 'center', gap: 26, minWidth: 380, boxShadow: 'var(--glow-azul)' }}>
          <svg style={{ width: 140, height: 140, flexShrink: 0 }} viewBox="0 0 150 150" fill="none">
            <defs>
              <linearGradient id="dash-ring-grad-global" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0" stopColor="#66D4F7"/><stop offset="0.5" stopColor="#2A6FDB"/><stop offset="1" stopColor="#7C5CFC"/>
              </linearGradient>
            </defs>
            <circle cx="75" cy="75" r="70" fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth="10"/>
            <circle cx="75" cy="75" r="70" fill="none" stroke="url(#dash-ring-grad-global)" strokeWidth="10"
              strokeDasharray={`${dashGlobal} ${C - dashGlobal}`} strokeLinecap="round"
              filter="drop-shadow(0 0 6px rgba(86,194,240,.55))"
              style={{ transform: 'rotate(-90deg)', transformOrigin: '75px 75px' }}/>
            <text x="75" y="75" textAnchor="middle" dominantBaseline="middle"
              style={{ fontFamily: 'Space Grotesk, sans-serif', fontWeight: 700, fontSize: 32, fill: 'var(--text-strong)' }}>
              {globalCompliance}%
            </text>
          </svg>
          <div>
            <span style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 10, letterSpacing: '0.12em', textTransform: 'uppercase', color: 'var(--celeste-300)' }}>
              Cumplimiento global
            </span>
            <h3 style={{ fontFamily: 'Space Grotesk, sans-serif', fontWeight: 700, fontSize: 24, color: 'var(--text-strong)', margin: '6px 0' }}>
              Promedio COMGES
            </h3>
            <p style={{ fontSize: 12.5, color: 'var(--text-muted)', marginTop: 6 }}>
              Promedio de tareas: {globalCompliance}%
            </p>
          </div>
        </div>

        {/* Compliance ring - Real */}
        <div className="dash-ring-card" style={{ ...CARD, flex: 1, display: 'flex', alignItems: 'center', gap: 26, minWidth: 380, boxShadow: 'var(--glow-azul)' }}>
          <svg style={{ width: 140, height: 140, flexShrink: 0 }} viewBox="0 0 150 150" fill="none">
            <defs>
              <linearGradient id="dash-ring-grad-real" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0" stopColor="#66D4F7"/><stop offset="0.5" stopColor="#2A6FDB"/><stop offset="1" stopColor="#7C5CFC"/>
              </linearGradient>
            </defs>
            <circle cx="75" cy="75" r="70" fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth="10"/>
            <circle cx="75" cy="75" r="70" fill="none" stroke="url(#dash-ring-grad-real)" strokeWidth="10"
              strokeDasharray={`${dashReal} ${C - dashReal}`} strokeLinecap="round"
              filter="drop-shadow(0 0 6px rgba(102,212,247,.55))"
              style={{ transform: 'rotate(-90deg)', transformOrigin: '75px 75px' }}/>
            <text x="75" y="75" textAnchor="middle" dominantBaseline="middle"
              style={{ fontFamily: 'Space Grotesk, sans-serif', fontWeight: 700, fontSize: 32, fill: 'var(--text-strong)' }}>
              {realCompliance}%
            </text>
          </svg>
          <div>
            <span style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 10, letterSpacing: '0.12em', textTransform: 'uppercase', color: 'var(--celeste-300)' }}>
              Cumplimiento real
            </span>
            <h3 style={{ fontFamily: 'Space Grotesk, sans-serif', fontWeight: 700, fontSize: 24, color: 'var(--text-strong)', margin: '6px 0' }}>
              Por objetivos completados
            </h3>
            <p style={{ fontSize: 11.5, color: 'var(--text-muted)', marginTop: 6 }}>
              Ejes 1-4: 20% · Ejes 5-6: 10%
            </p>
          </div>
        </div>
      </div>

      {/* Row 2 - Stat grid */}
      <div style={{ display: 'flex', gap: 18 }}>
        {/* Stat grid */}
        <div className="dash-stat-grid" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr 1fr', gap: 16, width: '100%' }}>
          {[
            { icon: 'target',        color: 'var(--celeste-300)', val: enriched.length,   label: 'Objetivos COMGES' },
            { icon: 'shield-alert',  color: 'var(--danger-300)',  val: openInc,            label: 'Incidentes abiertos' },
            { icon: 'alert-triangle',color: 'var(--warning-300)', val: criticalInc,        label: 'Incidentes críticos' },
            { icon: 'file-check-2',  color: 'var(--success-300)', val: data.evidence.length,label: 'Evidencias cargadas' },
          ].map(({ icon, color, val, label }) => (
            <div key={label} style={{ ...CARD, display: 'flex', flexDirection: 'column', gap: 8 }}>
              <span style={{ color }}>{Ic(icon)}</span>
              <div style={{ fontFamily: 'Space Grotesk, sans-serif', fontWeight: 700, fontSize: 30, color: 'var(--text-strong)' }}>{val}</div>
              <div style={{ fontSize: 12, color: 'var(--text-muted)' }}>{label}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Row 3 - Progress + incidents */}
      <div className="dash-row" style={{ display: 'flex', gap: 18 }}>
        {/* Progress bars */}
        <div style={{ ...CARD, flex: 1.4 }}>
          <h3 style={{ fontFamily: 'Space Grotesk, sans-serif', fontWeight: 600, fontSize: 16, color: 'var(--text-strong)', marginBottom: 18 }}>
            Avance por objetivo
          </h3>
          {enriched.length === 0
            ? <EmptyState icon="target" msg="Agrega objetivos COMGES para ver el progreso" />
            : <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
                {enriched.map(o => (
                  <div key={o.id} style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                    <span style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 10.5, color: 'var(--text-faint)', width: 82, flexShrink: 0 }}>{o.code}</span>
                    <div style={{ flex: 1, height: 7, background: 'rgba(6,15,43,.6)', borderRadius: 'var(--radius-pill)', overflow: 'hidden' }}>
                      <div style={{ height: '100%', width: o.progress + '%', background: TONE_GRAD[o.tone], borderRadius: 'var(--radius-pill)', transition: 'width 400ms' }} />
                    </div>
                    <span style={{ fontWeight: 600, fontSize: 13, width: 36, textAlign: 'right', flexShrink: 0, color: TONE_STROKE[o.tone] }}>
                      {o.progress}%
                    </span>
                  </div>
                ))}
              </div>
          }
        </div>

        {/* Recent incidents */}
        <div style={{ ...CARD, flex: 1 }}>
          <h3 style={{ fontFamily: 'Space Grotesk, sans-serif', fontWeight: 600, fontSize: 16, color: 'var(--text-strong)', marginBottom: 18 }}>
            Incidentes recientes
          </h3>
          {data.incidents.length === 0
            ? <EmptyState icon="shield-check" msg="Sin incidentes registrados" />
            : <div style={{ display: 'flex', flexDirection: 'column', gap: 0 }}>
                {data.incidents.slice(0, 5).map((i, idx) => (
                  <div key={i.id} style={{ display: 'flex', gap: 12, padding: '10px 0',
                    borderBottom: idx < Math.min(data.incidents.length, 5) - 1 ? '1px solid var(--border-subtle)' : 'none' }}>
                    <div style={{ width: 8, height: 8, borderRadius: '50%', marginTop: 5, flexShrink: 0, background: TONE_COLOR[i.severity] }} />
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--text-strong)', lineHeight: 1.3 }}>{i.title}</div>
                      <div style={{ fontSize: 11, color: 'var(--text-faint)', marginTop: 2 }}>{i.incident_number} · {i.status}</div>
                    </div>
                  </div>
                ))}
              </div>
          }
        </div>
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════
// ▸ OBJECTIVES SCREEN
// ════════════════════════════════════════════════════
function ObjectivesScreen({ userId, onNavigate, onHighlightEvidence }) {
  const [objectives, setObjectives] = useState([]);
  const [evidence, setEvidence]     = useState([]);
  const [loading, setLoading]       = useState(true);
  const [openId, setOpenId]         = useState(null);
  const [modal, setModal]           = useState(null); // null | 'new' | objective
  const [addTaskId, setAddTaskId]   = useState(null);
  const [saving, setSaving]         = useState(false);

  const load = useCallback(async () => {
    const objRes = await sb.from('objectives').select('*, tasks(*)').eq('user_id', userId).order('code');
    const evRes = await sb.from('evidence').select('*').eq('user_id', userId).order('created_at', { ascending: false });
    setObjectives(objRes.data || []);
    setEvidence(evRes.data || []);
    setLoading(false);
  }, [userId]);

  useEffect(() => { load(); }, [load]);

  const saveObj = async (form) => {
    setSaving(true);
    if (modal?.id) {
      await sb.from('objectives').update(form).eq('id', modal.id);
    } else {
      await sb.from('objectives').insert({ ...form, user_id: userId });
    }
    setSaving(false); setModal(null); load();
  };

  const deleteObj = async (id) => {
    if (!confirm('¿Eliminar este objetivo y todas sus tareas?')) return;
    await sb.from('objectives').delete().eq('id', id);
    load();
  };

  const toggleTask = async (taskId, done) => {
    await sb.from('tasks').update({ done: !done }).eq('id', taskId);
    load();
  };

  const addTask = async (objectiveId, name) => {
    await sb.from('tasks').insert({ objective_id: objectiveId, user_id: userId, name, done: false });
    setAddTaskId(null); load();
  };

  const deleteTask = async (taskId) => {
    await sb.from('tasks').delete().eq('id', taskId);
    load();
  };

  const updateTaskEvidence = async (taskId, field, evidenceId) => {
    const update = {};
    update[field] = evidenceId || null;
    await sb.from('tasks').update(update).eq('id', taskId);
    load();
  };

  if (loading) return <Spinner />;

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
      <div style={{ display: 'flex', justifyContent: 'flex-end', marginBottom: 2 }}>
        <Btn onClick={() => setModal('new')}>{Ic('plus')} Nuevo objetivo</Btn>
      </div>

      {objectives.length === 0
        ? <div style={CARD}><EmptyState icon="target" msg="Sin objetivos COMGES. Crea el primero." /></div>
        : objectives.map(o => {
            const total    = o.tasks?.length || 0;
            const done     = o.tasks?.filter(t => t.done).length || 0;
            const progress = total > 0 ? Math.round(done / total * 100) : 0;
            const tone     = getTone(progress);
            const isOpen   = openId === o.id;
            const RC       = 2 * Math.PI * 40;

            return (
              <div key={o.id} style={CARD} className="anim-fade">
                <div className="obj-row" style={{ display: 'flex', alignItems: 'flex-start', gap: 16 }}>
                  {/* Ring */}
                  <svg className="obj-ring" style={{ width: 80, height: 80, flexShrink: 0 }} viewBox="0 0 100 100" fill="none">
                    <circle cx="50" cy="50" r="40" fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth="7"/>
                    <circle cx="50" cy="50" r="40" fill="none" stroke={TONE_STROKE[tone]} strokeWidth="7"
                      strokeDasharray={`${RC * progress / 100} ${RC}`}
                      strokeLinecap="round" style={{ transform: 'rotate(-90deg)', transformOrigin: '50px 50px' }}/>
                    <text x="50" y="50" textAnchor="middle" dominantBaseline="middle"
                      style={{ fontFamily: 'Space Grotesk, sans-serif', fontWeight: 700, fontSize: 20, fill: 'var(--text-strong)' }}>
                      {progress}%
                    </text>
                  </svg>

                  {/* Info */}
                  <div className="obj-info" style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 5, flexWrap: 'wrap' }}>
                      <span style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 11, color: 'var(--celeste-300)' }}>{o.code}</span>
                      <Badge tone={tone}>{tone === 'ok' ? 'En meta' : tone === 'warn' ? 'En progreso' : 'Atrasado'}</Badge>
                      {o.plazo && <span style={{ fontSize: 11, color: 'var(--text-faint)' }}>Plazo {fmtDate(o.plazo)}</span>}
                    </div>
                    <h3 style={{ fontFamily: 'Space Grotesk, sans-serif', fontWeight: 600, fontSize: 17, color: 'var(--text-strong)', marginBottom: 4, cursor: 'pointer' }} 
                      onClick={() => setOpenId(isOpen ? null : o.id)}>
                      {o.name}
                    </h3>
                    {o.description && <p style={{ fontSize: 13, color: 'var(--text-muted)', marginBottom: 4 }}>{o.description}</p>}
                    {o.responsable && <p style={{ fontSize: 12, color: 'var(--text-faint)' }}>Responsable: {o.responsable}</p>}
                    <p style={{ fontSize: 12, color: 'var(--text-muted)', marginTop: 4 }}>{done}/{total} tareas completadas</p>
                  </div>

                  {/* Actions */}
                  <div className="obj-actions" style={{ display: 'flex', gap: 2, flexShrink: 0 }}>
                    <button onClick={() => setOpenId(isOpen ? null : o.id)} title="Ver tareas"
                      style={{ background: 'none', border: 'none', color: 'var(--text-faint)', cursor: 'pointer', padding: 6 }}>
                      {Ic(isOpen ? 'chevron-up' : 'chevron-down')}
                    </button>
                    <button onClick={() => setModal(o)} title="Editar"
                      style={{ background: 'none', border: 'none', color: 'var(--text-faint)', cursor: 'pointer', padding: 6 }}>
                      {Ic('pencil', { width: 15, height: 15 })}
                    </button>
                    <button onClick={() => deleteObj(o.id)} title="Eliminar"
                      style={{ background: 'none', border: 'none', color: 'var(--danger-500)', cursor: 'pointer', padding: 6 }}>
                      {Ic('trash-2', { width: 15, height: 15 })}
                    </button>
                  </div>
                </div>

                {/* Tasks panel */}
                {isOpen && (
                  <div style={{ marginTop: 16, paddingTop: 16, borderTop: '1px solid var(--border-subtle)' }}>
                    <div style={{ display: 'flex', flexDirection: 'column', gap: 8, marginBottom: 12 }}>
                      {(o.tasks || []).length === 0 && (
                        <p style={{ fontSize: 13, color: 'var(--text-faint)' }}>Sin tareas aún. Agrega la primera.</p>
                      )}
                      {(o.tasks || []).sort((a, b) => a.done - b.done).map(t => {
                        const ev1 = evidence.find(e => e.id === t.evidence_id);
                        const ev2 = evidence.find(e => e.id === t.evidence_id_2);
                        return (
                          <div key={t.id} style={{ display: 'flex', flexDirection: 'column', gap: 8, padding: '10px', background: 'rgba(255,255,255,0.03)', borderRadius: '8px' }}>
                            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                              <input type="checkbox" checked={t.done} onChange={() => toggleTask(t.id, t.done)} style={{ width: 17, height: 17, flexShrink: 0 }} />
                              <span style={{ flex: 1, fontSize: 13.5, color: 'var(--text-body)' }}>{t.name}</span>
                              <button onClick={() => deleteTask(t.id)} style={{ background: 'none', border: 'none', color: 'var(--text-faint)', cursor: 'pointer', padding: 2, opacity: 0.5, flexShrink: 0 }}>{Ic('x', { width: 14, height: 14 })}</button>
                            </div>
                            {ev1 || ev2 ? (
                              <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                                {ev1 && <span style={{ fontSize: 11, color: 'var(--celeste-300)', background: 'rgba(86,194,240,.15)', padding: '3px 8px', borderRadius: '3px', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 4 }} onClick={() => { onHighlightEvidence(ev1.id); onNavigate('evidence'); }}>{ev1.name} <button onClick={(e) => { e.stopPropagation(); updateTaskEvidence(t.id, 'evidence_id', null); }} style={{ background: 'none', border: 'none', color: 'var(--celeste-300)', cursor: 'pointer', padding: 0, fontSize: '12px' }}>×</button></span>}
                                {ev2 && <span style={{ fontSize: 11, color: 'var(--celeste-300)', background: 'rgba(86,194,240,.15)', padding: '3px 8px', borderRadius: '3px', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 4 }} onClick={() => { onHighlightEvidence(ev2.id); onNavigate('evidence'); }}>{ev2.name} <button onClick={(e) => { e.stopPropagation(); updateTaskEvidence(t.id, 'evidence_id_2', null); }} style={{ background: 'none', border: 'none', color: 'var(--celeste-300)', cursor: 'pointer', padding: 0, fontSize: '12px' }}>×</button></span>}
                              </div>
                            ) : null}
                            <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                              {!ev1 && <select onChange={(e) => { if (e.target.value) updateTaskEvidence(t.id, 'evidence_id', e.target.value); }} style={{ fontSize: 11, padding: '4px 8px', background: 'rgba(79,132,242,.15)', border: '1px solid rgba(79,132,242,.3)', borderRadius: '4px', color: 'var(--azul-400)' }}><option value="">+ Evidencia 1</option>{evidence.map(e => <option key={e.id} value={e.id}>{e.name}</option>)}</select>}
                              {ev1 && !ev2 && <select onChange={(e) => { if (e.target.value) updateTaskEvidence(t.id, 'evidence_id_2', e.target.value); }} style={{ fontSize: 11, padding: '4px 8px', background: 'rgba(79,132,242,.15)', border: '1px solid rgba(79,132,242,.3)', borderRadius: '4px', color: 'var(--azul-400)' }}><option value="">+ Evidencia 2</option>{evidence.filter(e => e.id !== t.evidence_id).map(e => <option key={e.id} value={e.id}>{e.name}</option>)}</select>}
                            </div>
                          </div>
                        );
                      })}
                    </div>

                    {addTaskId === o.id
                      ? <InlineAddTask onAdd={name => addTask(o.id, name)} onCancel={() => setAddTaskId(null)} />
                      : <Btn size="sm" variant="ghost" onClick={() => setAddTaskId(o.id)}>
                          {Ic('plus', { width: 14, height: 14 })} Agregar tarea
                        </Btn>
                    }
                  </div>
                )}
              </div>
            );
          })
      }

      {modal !== null && (
        <ObjModal
          initial={modal === 'new' ? null : modal}
          onClose={() => setModal(null)}
          onSave={saveObj}
          saving={saving}
        />
      )}
    </div>
  );
}

function InlineAddTask({ onAdd, onCancel }) {
  const [name, setName] = useState('');
  return (
    <div style={{ display: 'flex', gap: 8 }}>
      <input value={name} onChange={e => setName(e.target.value)} placeholder="Nombre de la tarea…" autoFocus
        onKeyDown={e => { if (e.key === 'Enter' && name.trim()) onAdd(name.trim()); if (e.key === 'Escape') onCancel(); }}
        style={{ flex: 1, padding: '8px 12px', fontSize: 13 }} />
      <Btn size="sm" onClick={() => name.trim() && onAdd(name.trim())}>Agregar</Btn>
      <Btn size="sm" variant="ghost" onClick={onCancel}>Cancelar</Btn>
    </div>
  );
}

function ObjModal({ initial, onClose, onSave, saving }) {
  const [f, setF] = useState({
    code: initial?.code || '', name: initial?.name || '',
    description: initial?.description || '', plazo: initial?.plazo || '',
    responsable: initial?.responsable || '',
  });
  const s = (k, v) => setF(p => ({ ...p, [k]: v }));
  return (
    <Modal title={initial ? 'Editar objetivo' : 'Nuevo objetivo COMGES'} onClose={onClose}>
      <form onSubmit={e => { e.preventDefault(); onSave(f); }}>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
          <Field label="Código"><input value={f.code} onChange={e => s('code', e.target.value)} placeholder="COMGES 01" required /></Field>
          <Field label="Responsable"><input value={f.responsable} onChange={e => s('responsable', e.target.value)} placeholder="Nombre responsable" /></Field>
        </div>
        <Field label="Nombre del objetivo"><input value={f.name} onChange={e => s('name', e.target.value)} placeholder="Gobernanza de ciberseguridad" required /></Field>
        <Field label="Descripción"><textarea value={f.description} onChange={e => s('description', e.target.value)} placeholder="Describe brevemente el objetivo…" /></Field>
        <Field label="Fecha límite"><input type="date" value={f.plazo} onChange={e => s('plazo', e.target.value)} /></Field>
        <div style={{ display: 'flex', gap: 10, justifyContent: 'flex-end', marginTop: 8 }}>
          <Btn variant="ghost" onClick={onClose}>Cancelar</Btn>
          <Btn type="submit" disabled={saving}>{saving ? 'Guardando…' : initial ? 'Actualizar' : 'Crear objetivo'}</Btn>
        </div>
      </form>
    </Modal>
  );
}

// ════════════════════════════════════════════════════
// ▸ INCIDENTS SCREEN
// ════════════════════════════════════════════════════
function IncidentsScreen({ userId }) {
  const [incidents, setIncidents] = useState([]);
  const [loading, setLoading]     = useState(true);
  const [modal, setModal]         = useState(null);
  const [detail, setDetail]       = useState(null);

  const load = useCallback(async () => {
    const { data } = await sb.from('incidents').select('*').eq('user_id', userId).order('incident_date', { ascending: false });
    setIncidents(data || []);
    setLoading(false);
  }, [userId]);

  useEffect(() => { load(); }, [load]);

  const save = async (form) => {
    if (modal?.id) {
      await sb.from('incidents').update(form).eq('id', modal.id);
    } else {
      const year = new Date().getFullYear();
      const num  = String(incidents.length + 1).padStart(4, '0');
      await sb.from('incidents').insert({ ...form, user_id: userId, incident_number: `INC-${year}-${num}` });
    }
    setModal(null); load();
  };

  const del = async (id) => {
    if (!confirm('¿Eliminar este incidente?')) return;
    await sb.from('incidents').delete().eq('id', id); load();
  };

  const changeStatus = async (id, status) => {
    await sb.from('incidents').update({ status }).eq('id', id); load();
  };

  if (loading) return <Spinner />;

  const criticals = incidents.filter(i => i.severity === 'risk' && i.status !== 'Resuelto');

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 18 }}>
      {criticals.length > 0 && (
        <div style={{ ...CARD, background: 'rgba(242,86,111,.12)', border: '1px solid rgba(252,165,184,.34)' }}>
          <div style={{ display: 'flex', gap: 12 }}>
            <span style={{ color: 'var(--danger-300)', flexShrink: 0 }}>{Ic('shield-alert')}</span>
            <div>
              <div style={{ fontWeight: 600, color: 'var(--text-strong)', marginBottom: 4 }}>
                {criticals.length} incidente{criticals.length > 1 ? 's' : ''} crítico{criticals.length > 1 ? 's' : ''} activo{criticals.length > 1 ? 's' : ''}
              </div>
              <div style={{ fontSize: 13, color: 'var(--text-muted)' }}>{criticals[0].incident_number} — {criticals[0].title}</div>
            </div>
          </div>
        </div>
      )}

      <div style={{ display: 'flex', justifyContent: 'flex-end' }}>
        <Btn onClick={() => setModal('new')}>{Ic('plus')} Nuevo incidente</Btn>
      </div>

      <div style={{ ...CARD, padding: 0, overflow: 'hidden' }}>
        <div style={{ padding: '16px 20px', borderBottom: '1px solid var(--border-subtle)', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <h3 style={{ fontFamily: 'Space Grotesk, sans-serif', fontWeight: 600, fontSize: 16, color: 'var(--text-strong)' }}>Registro de incidentes</h3>
          <span style={{ fontSize: 12, color: 'var(--text-faint)' }}>{incidents.length} total</span>
        </div>

        {incidents.length === 0
          ? <EmptyState icon="shield-check" msg="Sin incidentes registrados. ¡Todo en orden!" />
          : incidents.map((i, idx) => (
              <div key={i.id} style={{
                display: 'grid', gridTemplateColumns: '2.2fr 1fr 1.6fr auto',
                gap: 14, padding: '14px 20px', alignItems: 'flex-start',
                borderBottom: idx < incidents.length - 1 ? '1px solid var(--border-subtle)' : 'none',
              }}>
                <div>
                  <div style={{ fontWeight: 600, color: 'var(--text-strong)', fontSize: 13.5 }}>{i.title}</div>
                  {i.description && <div style={{ fontSize: 12, color: 'var(--text-muted)', marginTop: 5, lineHeight: 1.4 }}>{i.description}</div>}
                  <div style={{ display: 'flex', gap: 8, marginTop: 6 }}>
                    <span style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 10.5, color: 'var(--text-faint)' }}>{i.incident_number}</span>
                    {i.asset && <span style={{ fontSize: 11, color: 'var(--text-faint)' }}>· {i.asset}</span>}
                  </div>
                </div>
                <Badge tone={i.severity}>{i.sev_label}</Badge>
                <select value={i.status} onChange={e => changeStatus(i.id, e.target.value)}
                  style={{ padding: '5px 10px', fontSize: 12, borderRadius: 'var(--radius-pill)', cursor: 'pointer' }}>
                  {['En detección','En análisis','En contención','Asignado','En remediación','Resuelto'].map(s => <option key={s}>{s}</option>)}
                </select>
                <div style={{ display: 'flex', gap: 4 }}>
                  <button onClick={() => setDetail(i)} title="Ver detalle"
                    style={{ background: 'none', border: 'none', color: 'var(--text-faint)', cursor: 'pointer', padding: 5 }}>
                    {Ic('eye', { width: 15, height: 15 })}
                  </button>
                  <button onClick={() => setModal(i)} title="Editar"
                    style={{ background: 'none', border: 'none', color: 'var(--text-faint)', cursor: 'pointer', padding: 5 }}>
                    {Ic('pencil', { width: 15, height: 15 })}
                  </button>
                  <button onClick={() => del(i.id)} title="Eliminar"
                    style={{ background: 'none', border: 'none', color: 'var(--danger-500)', cursor: 'pointer', padding: 5 }}>
                    {Ic('trash-2', { width: 15, height: 15 })}
                  </button>
                </div>
              </div>
            ))
        }
      </div>

      {modal && <IncModal initial={modal === 'new' ? null : modal} onClose={() => setModal(null)} onSave={save} />}
      {detail && <IncDetail incident={detail} onClose={() => setDetail(null)} />}
    </div>
  );
}

function IncModal({ initial, onClose, onSave }) {
  const [f, setF] = useState({
    title: initial?.title || '', description: initial?.description || '',
    severity: initial?.severity || 'warn', sev_label: initial?.sev_label || 'Medio',
    status: initial?.status || 'En detección', asset: initial?.asset || '',
    reported_by: initial?.reported_by || '', owner: initial?.owner || '',
    incident_date: initial?.incident_date ? initial.incident_date.slice(0,10) : new Date().toISOString().slice(0,10),
  });
  const [saving, setSaving] = useState(false);
  const s = (k, v) => setF(p => ({ ...p, [k]: v }));

  const handleSev = v => { s('severity', v); s('sev_label', SEV_LABEL[v]); };

  return (
    <Modal title={initial ? 'Editar incidente' : 'Nuevo incidente'} onClose={onClose} width={580}>
      <form onSubmit={async e => { e.preventDefault(); setSaving(true); await onSave(f); setSaving(false); }}>
        <Field label="Título del incidente">
          <input value={f.title} onChange={e => s('title', e.target.value)} placeholder="Describe brevemente el incidente" required />
        </Field>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
          <Field label="Severidad">
            <select value={f.severity} onChange={e => handleSev(e.target.value)}>
              <option value="ok">Bajo</option>
              <option value="warn">Medio</option>
              <option value="risk">Crítico</option>
            </select>
          </Field>
          <Field label="Estado">
            <select value={f.status} onChange={e => s('status', e.target.value)}>
              {['En detección','En análisis','En contención','Asignado','En remediación','Resuelto'].map(v => <option key={v}>{v}</option>)}
            </select>
          </Field>
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
          <Field label="Fecha del incidente">
            <input type="date" value={f.incident_date} onChange={e => s('incident_date', e.target.value)} />
          </Field>
          <Field label="Activo afectado">
            <input value={f.asset} onChange={e => s('asset', e.target.value)} placeholder="Servidor, sistema, red…" />
          </Field>
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
          <Field label="Reportado por">
            <input value={f.reported_by} onChange={e => s('reported_by', e.target.value)} placeholder="Fuente de detección" />
          </Field>
          <Field label="Responsable">
            <input value={f.owner} onChange={e => s('owner', e.target.value)} placeholder="Responsable de atención" />
          </Field>
        </div>
        <Field label="Descripción">
          <textarea value={f.description} onChange={e => s('description', e.target.value)} placeholder="Describe el incidente en detalle…" />
        </Field>
        <div style={{ display: 'flex', gap: 10, justifyContent: 'flex-end', marginTop: 8 }}>
          <Btn variant="ghost" onClick={onClose}>Cancelar</Btn>
          <Btn type="submit" disabled={saving}>{saving ? 'Guardando…' : initial ? 'Actualizar' : 'Registrar incidente'}</Btn>
        </div>
      </form>
    </Modal>
  );
}

function IncDetail({ incident: i, onClose }) {
  return (
    <Modal title={i.incident_number || 'Detalle'} onClose={onClose} width={560}>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
        <h3 style={{ fontFamily: 'Space Grotesk, sans-serif', fontSize: 18, color: 'var(--text-strong)' }}>{i.title}</h3>
        <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap' }}>
          <Badge tone={i.severity}>{i.sev_label}</Badge>
          <Badge tone="azul">{i.status}</Badge>
        </div>
        {i.description && <p style={{ fontSize: 13.5, color: 'var(--text-muted)', lineHeight: 1.65 }}>{i.description}</p>}
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14 }}>
          {[['Activo afectado', i.asset], ['Reportado por', i.reported_by], ['Responsable', i.owner], ['Fecha', fmtDate(i.incident_date)]]
            .filter(([, v]) => v)
            .map(([label, value]) => (
              <div key={label}>
                <div style={{ fontSize: 10, color: 'var(--text-faint)', textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 5 }}>{label}</div>
                <div style={{ fontSize: 14, color: 'var(--text-body)' }}>{value}</div>
              </div>
            ))
          }
        </div>
        <div style={{ display: 'flex', justifyContent: 'flex-end', marginTop: 8 }}>
          <Btn variant="ghost" onClick={onClose}>Cerrar</Btn>
        </div>
      </div>
    </Modal>
  );
}

// ════════════════════════════════════════════════════
// ▸ EVIDENCE SCREEN
// ════════════════════════════════════════════════════
function EvidenceScreen({ userId, highlightEvidenceId }) {
  const [objectives, setObjectives] = useState([]);
  const [evidence, setEvidence]     = useState([]);
  const [loading, setLoading]       = useState(true);
  const [modal, setModal]           = useState(null);
  const [expandedCode, setExpandedCode] = useState(null);

  const load = useCallback(async () => {
    const [{ data: objs }, { data: ev }] = await Promise.all([
      sb.from('objectives').select('id,code,name').eq('user_id', userId).order('code'),
      sb.from('evidence').select('*').eq('user_id', userId).order('created_at', { ascending: false }),
    ]);
    setObjectives(objs || []);
    setEvidence(ev || []);
    setLoading(false);
  }, [userId]);

  useEffect(() => { load(); }, [load]);

  const save = async (form) => {
    if (modal?.id) {
      await sb.from('evidence').update(form).eq('id', modal.id);
    } else {
      await sb.from('evidence').insert({ ...form, user_id: userId });
    }
    setModal(null); load();
  };

  const del = async (id) => {
    if (!confirm('¿Eliminar esta evidencia?')) return;
    await sb.from('evidence').delete().eq('id', id); load();
  };

  if (loading) return <Spinner />;

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
      <div style={{ display: 'flex', justifyContent: 'flex-end', marginBottom: 2 }}>
        <Btn onClick={() => setModal('new')} disabled={objectives.length === 0}>
          {Ic('plus')} Agregar evidencia
        </Btn>
      </div>
      {objectives.length === 0
        ? <div style={CARD}><EmptyState icon="file-check-2" msg="Primero crea objetivos COMGES para asignar evidencias." /></div>
        : objectives.map(obj => {
            const docs   = evidence.filter(e => e.objective_code === obj.code);
            const isOpen = expandedCode === obj.code;
            return (
              <div key={obj.id} style={CARD}>
                <button onClick={() => setExpandedCode(isOpen ? null : obj.code)}
                  style={{ width: '100%', border: 'none', background: 'none', padding: 0, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 14, textAlign: 'left' }}>
                  <div style={{ flex: 1 }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 4 }}>
                      <span style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 11, color: 'var(--celeste-300)' }}>{obj.code}</span>
                      {docs.length > 0
                        ? <Badge tone="ok">{docs.length} doc{docs.length > 1 ? 's' : ''}</Badge>
                        : <Badge tone="risk">Sin evidencia</Badge>
                      }
                    </div>
                    <h3 style={{ fontFamily: 'Space Grotesk, sans-serif', fontWeight: 600, fontSize: 15, color: 'var(--text-strong)' }}>{obj.name}</h3>
                  </div>
                  {Ic(isOpen ? 'chevron-up' : 'chevron-down')}
                </button>

                {isOpen && (
                  <div style={{ marginTop: 14, paddingTop: 14, borderTop: '1px solid var(--border-subtle)' }}>
                    {docs.length === 0
                      ? <p style={{ fontSize: 13, color: 'var(--text-faint)', marginBottom: 10 }}>Sin documentos para este objetivo.</p>
                      : docs.map(doc => {
                          const statusTone = doc.status === 'Aprobado' ? 'ok' : doc.status === 'Rechazado' ? 'risk' : 'warn';
                          return (
                            <div key={doc.id} className="ev-doc-row" style={{ display: 'flex', gap: 12, alignItems: 'center', padding: '10px 8px', borderBottom: '1px solid var(--border-subtle)', background: highlightEvidenceId === doc.id ? 'rgba(86,194,240,.2)' : 'transparent', borderRadius: '6px' }}>
                              {Ic('file-text', { width: 16, height: 16, color: 'var(--celeste-300)', flexShrink: 0 })}
                              <div className="ev-doc-info" style={{ flex: 1 }}>
                                <div style={{ fontWeight: 500, color: 'var(--text-strong)', fontSize: 13.5 }}>{doc.name}</div>
                                <span style={{ fontSize: 11, color: 'var(--text-faint)' }}>
                                  {doc.format}{doc.size ? ` · ${doc.size}` : ''} · {fmtDate(doc.created_at)}
                                </span>
                              </div>
                              <Badge tone={statusTone}>{doc.status}</Badge>
                              <div className="ev-doc-actions" style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
                                {doc.file_url && (
                                  <a href={doc.file_url} target="_blank" rel="noreferrer"
                                    style={{ color: 'var(--azul-400)', display: 'flex', alignItems: 'center', padding: 4 }}>
                                    {Ic('external-link', { width: 14, height: 14 })}
                                  </a>
                                )}
                                <button onClick={() => setModal(doc)}
                                  style={{ background: 'none', border: 'none', color: 'var(--text-faint)', cursor: 'pointer', padding: 4 }}>
                                  {Ic('pencil', { width: 14, height: 14 })}
                                </button>
                                <button onClick={() => del(doc.id)}
                                  style={{ background: 'none', border: 'none', color: 'var(--danger-500)', cursor: 'pointer', padding: 4 }}>
                                  {Ic('trash-2', { width: 14, height: 14 })}
                                </button>
                              </div>
                            </div>
                          );
                        })
                    }
                    <div style={{ marginTop: 12 }}>
                      <Btn size="sm" variant="ghost" onClick={() => setModal({ objective_code: obj.code })}>
                        {Ic('plus', { width: 14, height: 14 })} Agregar documento aquí
                      </Btn>
                    </div>
                  </div>
                )}
              </div>
            );
          })
      }

      {modal && (
        <EvModal
          initial={modal === 'new' ? null : (modal?.id ? modal : { objective_code: modal?.objective_code || '' })}
          objectives={objectives}
          onClose={() => setModal(null)}
          onSave={save}
        />
      )}
    </div>
  );
}

function EvModal({ initial, objectives, onClose, onSave }) {
  const [f, setF] = useState({
    objective_code: initial?.objective_code || objectives[0]?.code || '',
    name: initial?.name || '', format: initial?.format || 'PDF',
    status: initial?.status || 'Pendiente',
    file_url: initial?.file_url || '',
  });
  const [saving, setSaving] = useState(false);
  const s = (k, v) => setF(p => ({ ...p, [k]: v }));

  return (
    <Modal title={initial?.id ? 'Editar evidencia' : 'Nueva evidencia'} onClose={onClose}>
      <form onSubmit={async e => { e.preventDefault(); setSaving(true); await onSave(f); setSaving(false); }}>
        <Field label="Objetivo COMGES">
          <select value={f.objective_code} onChange={e => s('objective_code', e.target.value)}>
            {objectives.map(o => <option key={o.id} value={o.code}>{o.code} — {o.name}</option>)}
          </select>
        </Field>
        <Field label="Nombre del documento">
          <input value={f.name} onChange={e => s('name', e.target.value)} placeholder="Ej: Política de ciberseguridad 2026" required />
        </Field>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
          <Field label="Formato">
            <select value={f.format} onChange={e => s('format', e.target.value)}>
              {['PDF','DOCX','XLSX','PPT','ZIP','IMG','Otro'].map(v => <option key={v}>{v}</option>)}
            </select>
          </Field>
          <Field label="Estado">
            <select value={f.status} onChange={e => s('status', e.target.value)}>
              {['Pendiente','En revisión','Aprobado','Rechazado'].map(v => <option key={v}>{v}</option>)}
            </select>
          </Field>
        </div>
        <Field label="URL del archivo (opcional)">
          <input type="url" value={f.file_url} onChange={e => s('file_url', e.target.value)} placeholder="https://drive.google.com/…" />
        </Field>
        <div style={{ display: 'flex', gap: 10, justifyContent: 'flex-end', marginTop: 8 }}>
          <Btn variant="ghost" onClick={onClose}>Cancelar</Btn>
          <Btn type="submit" disabled={saving}>{saving ? 'Guardando…' : initial?.id ? 'Actualizar' : 'Guardar evidencia'}</Btn>
        </div>
      </form>
    </Modal>
  );
}

// ════════════════════════════════════════════════════
// ▸ ORG SCREEN
// ════════════════════════════════════════════════════
function OrgScreen({ userId }) {
  const [f, setF] = useState({
    org_name: '', org_region: '', org_ciudad: '', org_tipo_oiv: '',
    org_nivel_complejidad: '', org_usuarios_activos: '', org_equipo_seguridad: '',
    encargado_nombre: '', encargado_correo: '',
  });
  const [loading, setLoading] = useState(true);
  const [saving, setSaving]   = useState(false);
  const [saved, setSaved]     = useState(false);
  const [isEditing, setIsEditing] = useState(false);
  const s = (k, v) => setF(p => ({ ...p, [k]: v }));

  useEffect(() => {
    (async () => {
      const { data } = await sb.from('profiles').select('*').eq('id', userId).single();
      if (data) setF(p => ({ ...p, ...data }));
      setLoading(false);
    })();
  }, [userId]);

  const handleSave = async (e) => {
    e.preventDefault(); setSaving(true);
    await sb.from('profiles').upsert({ id: userId, ...f });
    setSaving(false); setSaved(true);
    setIsEditing(false);
    setTimeout(() => setSaved(false), 2500);
  };

  const initials = f.org_name
    ? f.org_name.split(' ').filter(Boolean).map(w => w[0]).slice(0, 2).join('').toUpperCase()
    : '?';

  if (loading) return <Spinner />;

  // Modo de solo lectura (cuando no está editando)
  if (!isEditing && f.org_name) {
    return (
      <div style={{ display: 'flex', flexDirection: 'column', gap: 20, maxWidth: 1000 }}>
        <div className="org-header" style={{ ...CARD, display: 'flex', gap: 24, alignItems: 'center' }}>
          <div style={{ width: 80, height: 80, borderRadius: 'var(--radius-lg)', flexShrink: 0,
            background: 'var(--grad-shield)', display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontFamily: 'Space Grotesk, sans-serif', fontWeight: 700, fontSize: 26, color: '#fff' }}>
            {initials}
          </div>
          <div className="org-header-info" style={{ flex: 1, minWidth: 0 }}>
            <h2 style={{ fontFamily: 'Space Grotesk, sans-serif', fontWeight: 700, fontSize: 22, color: 'var(--text-strong)' }}>
              {f.org_name}
            </h2>
            <p style={{ fontSize: 13, color: 'var(--text-muted)', marginTop: 4 }}>
              {f.org_tipo_oiv} · {f.org_ciudad}
            </p>
          </div>
          <Btn onClick={() => setIsEditing(true)}>{Ic('pencil', { width: 15, height: 15 })} Editar</Btn>
        </div>

        <div style={CARD}>
          <h3 style={{ fontFamily: 'Space Grotesk, sans-serif', fontWeight: 600, fontSize: 16, color: 'var(--text-strong)', marginBottom: 18 }}>
            Información del organismo
          </h3>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 24, fontSize: 13.5 }}>
            <div>
              <div style={{ color: 'var(--text-faint)', fontSize: 10.5, marginBottom: 6, textTransform: 'uppercase', fontWeight: 700, letterSpacing: '0.05em' }}>Nombre</div>
              <div style={{ color: 'var(--text-strong)', fontSize: 14, fontWeight: 500 }}>{f.org_name}</div>
            </div>
            <div>
              <div style={{ color: 'var(--text-faint)', fontSize: 10.5, marginBottom: 6, textTransform: 'uppercase', fontWeight: 700, letterSpacing: '0.05em' }}>Región</div>
              <div style={{ color: 'var(--text-strong)', fontSize: 14, fontWeight: 500 }}>{f.org_region || '—'}</div>
            </div>
            <div>
              <div style={{ color: 'var(--text-faint)', fontSize: 10.5, marginBottom: 6, textTransform: 'uppercase', fontWeight: 700, letterSpacing: '0.05em' }}>Ciudad</div>
              <div style={{ color: 'var(--text-strong)', fontSize: 14, fontWeight: 500 }}>{f.org_ciudad || '—'}</div>
            </div>
            <div>
              <div style={{ color: 'var(--text-faint)', fontSize: 10.5, marginBottom: 6, textTransform: 'uppercase', fontWeight: 700, letterSpacing: '0.05em' }}>Tipo OIV</div>
              <div style={{ color: 'var(--text-strong)', fontSize: 14, fontWeight: 500 }}>{f.org_tipo_oiv || '—'}</div>
            </div>
            <div>
              <div style={{ color: 'var(--text-faint)', fontSize: 10.5, marginBottom: 6, textTransform: 'uppercase', fontWeight: 700, letterSpacing: '0.05em' }}>Complejidad</div>
              <div style={{ color: 'var(--text-strong)', fontSize: 14, fontWeight: 500 }}>{f.org_nivel_complejidad || '—'}</div>
            </div>
            <div>
              <div style={{ color: 'var(--text-faint)', fontSize: 10.5, marginBottom: 6, textTransform: 'uppercase', fontWeight: 700, letterSpacing: '0.05em' }}>Usuarios activos</div>
              <div style={{ color: 'var(--text-strong)', fontSize: 14, fontWeight: 500 }}>{f.org_usuarios_activos || '—'}</div>
            </div>
            <div>
              <div style={{ color: 'var(--text-faint)', fontSize: 10.5, marginBottom: 6, textTransform: 'uppercase', fontWeight: 700, letterSpacing: '0.05em' }}>Equipo seguridad</div>
              <div style={{ color: 'var(--text-strong)', fontSize: 14, fontWeight: 500 }}>{f.org_equipo_seguridad || '—'}</div>
            </div>
          </div>
        </div>

        <div style={CARD}>
          <h3 style={{ fontFamily: 'Space Grotesk, sans-serif', fontWeight: 600, fontSize: 16, color: 'var(--text-strong)', marginBottom: 18 }}>
            Encargado de ciberseguridad
          </h3>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 24 }}>
            <div>
              <div style={{ color: 'var(--text-faint)', fontSize: 10.5, marginBottom: 6, textTransform: 'uppercase', fontWeight: 700, letterSpacing: '0.05em' }}>Nombre</div>
              <div style={{ color: 'var(--text-strong)', fontSize: 14, fontWeight: 500 }}>{f.encargado_nombre || '—'}</div>
            </div>
            <div>
              <div style={{ color: 'var(--text-faint)', fontSize: 10.5, marginBottom: 6, textTransform: 'uppercase', fontWeight: 700, letterSpacing: '0.05em' }}>Correo electrónico</div>
              <div style={{ color: 'var(--text-strong)', fontSize: 14, fontWeight: 500 }}>{f.encargado_correo || '—'}</div>
            </div>
          </div>
        </div>
      </div>
    );
  }

  // Modo de edición
  return (
    <form onSubmit={handleSave} style={{ display: 'flex', flexDirection: 'column', gap: 20, maxWidth: 900 }}>
      {/* Header card */}
      <div className="org-header" style={{ ...CARD, display: 'flex', gap: 24, alignItems: 'center' }}>
        <div style={{ width: 80, height: 80, borderRadius: 'var(--radius-lg)', flexShrink: 0,
          background: 'var(--grad-shield)', display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontFamily: 'Space Grotesk, sans-serif', fontWeight: 700, fontSize: 26, color: '#fff' }}>
          {initials}
        </div>
        <div className="org-header-info" style={{ flex: 1, minWidth: 0 }}>
          <h2 style={{ fontFamily: 'Space Grotesk, sans-serif', fontWeight: 700, fontSize: 22, color: 'var(--text-strong)' }}>
            {f.org_name || 'Configura tu organismo'}
          </h2>
          <p style={{ fontSize: 13, color: 'var(--text-muted)', marginTop: 4 }}>
            {f.org_tipo_oiv || 'Tipo de OIV no configurado'} · {f.org_ciudad || '—'}
          </p>
        </div>
        <div className="org-header-actions" style={{ display: 'flex', gap: 10, flexShrink: 0 }}>
          <Btn type="submit" disabled={saving} variant={saved ? 'success' : 'primary'}>
            {saving ? 'Guardando…' : saved ? `${Ic('check', { width: 15, height: 15 })} ¡Guardado!` : 'Guardar cambios'}
          </Btn>
          <Btn variant="ghost" onClick={() => setIsEditing(false)}>Cancelar</Btn>
        </div>
      </div>

      <div style={CARD}>
        <h3 style={{ fontFamily: 'Space Grotesk, sans-serif', fontWeight: 600, fontSize: 16, color: 'var(--text-strong)', marginBottom: 20 }}>
          Información del organismo
        </h3>
        <Field label="Nombre del organismo">
          <input value={f.org_name} onChange={e => s('org_name', e.target.value)} placeholder="Ej: Hospital Dr. Sótero del Río" />
        </Field>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
          <Field label="Región"><input value={f.org_region} onChange={e => s('org_region', e.target.value)} placeholder="Región Metropolitana" /></Field>
          <Field label="Ciudad"><input value={f.org_ciudad} onChange={e => s('org_ciudad', e.target.value)} placeholder="Santiago" /></Field>
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: '1.5fr 1fr', gap: 16 }}>
          <Field label="Tipo de OIV">
            <input value={f.org_tipo_oiv} onChange={e => s('org_tipo_oiv', e.target.value)} placeholder="Centro de salud de importancia vital" />
          </Field>
          <Field label="Nivel de complejidad">
            <select value={f.org_nivel_complejidad} onChange={e => s('org_nivel_complejidad', e.target.value)}>
              <option value="">Seleccionar…</option>
              {['Bajo','Medio','Alto','Crítico'].map(v => <option key={v}>{v}</option>)}
            </select>
          </Field>
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
          <Field label="Usuarios activos">
            <input type="number" value={f.org_usuarios_activos} onChange={e => s('org_usuarios_activos', e.target.value)} placeholder="1247" />
          </Field>
          <Field label="Equipo de seguridad (personas)">
            <input type="number" value={f.org_equipo_seguridad} onChange={e => s('org_equipo_seguridad', e.target.value)} placeholder="8" />
          </Field>
        </div>
      </div>

      <div style={CARD}>
        <h3 style={{ fontFamily: 'Space Grotesk, sans-serif', fontWeight: 600, fontSize: 16, color: 'var(--text-strong)', marginBottom: 20 }}>
          Encargado de ciberseguridad
        </h3>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
          <Field label="Nombre completo">
            <input value={f.encargado_nombre} onChange={e => s('encargado_nombre', e.target.value)} placeholder="Dr. José García Rodríguez" />
          </Field>
          <Field label="Correo electrónico">
            <input type="email" value={f.encargado_correo} onChange={e => s('encargado_correo', e.target.value)} placeholder="encargado@organismo.cl" />
          </Field>
        </div>
      </div>
    </form>
  );
}

// ════════════════════════════════════════════════════
// ▸ ISO 27001 — PANTALLA PENDIENTE
// ════════════════════════════════════════════════════
function IsoPendingScreen() {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
      textAlign: 'center', minHeight: '60vh', gap: 18, padding: 20 }}>
      <div style={{ width: 88, height: 88, borderRadius: 'var(--radius-lg)',
        background: 'var(--grad-shield)', display: 'flex', alignItems: 'center', justifyContent: 'center',
        color: '#fff', boxShadow: 'var(--shadow-md)' }}>
        {Ic('globe', { width: 44, height: 44 })}
      </div>
      <div>
        <h2 style={{ fontFamily: 'Space Grotesk, sans-serif', fontWeight: 700, fontSize: 24, color: 'var(--text-strong)' }}>
          ISO 27001
        </h2>
        <p style={{ fontSize: 14, color: 'var(--text-muted)', marginTop: 10, maxWidth: 440 }}>
          El módulo de cumplimiento ISO/IEC 27001 está en desarrollo. Pronto podrás gestionar tus
          controles del SGSI desde aquí.
        </p>
      </div>
      <span style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 10.5, fontWeight: 600,
        letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--warning-300)',
        background: 'rgba(244,183,64,.14)', border: '1px solid rgba(252,215,126,.3)',
        borderRadius: 'var(--radius-pill)', padding: '5px 13px' }}>
        Próximamente
      </span>
    </div>
  );
}

// ════════════════════════════════════════════════════
// ▸ APP ROOT
// ════════════════════════════════════════════════════
function App() {
  const [user, setUser]         = useState(null);
  const [loading, setLoading]   = useState(true);
  const [framework, setFramework] = useState(null); // null | 'comges' | 'iso'
  const [current, setCurrent]   = useState('dashboard');
  const [openInc, setOpenInc]   = useState(0);
  const [isMobile, setIsMobile] = useState(typeof window !== 'undefined' ? window.innerWidth <= 768 : false);
  const [highlightEvidenceId, setHighlightEvidenceId] = useState(null);
  const [drawerOpen, setDrawerOpen] = useState(false);

  // Detectar viewport
  useEffect(() => {
    const onResize = () => {
      const mobile = window.innerWidth <= 768;
      setIsMobile(mobile);
      if (!mobile) setDrawerOpen(false);
    };
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);

  useEffect(() => {
    if (NOT_CONFIGURED) { setLoading(false); return; }
    sb.auth.getUser().then(({ data: { user } }) => { setUser(user); setLoading(false); });
    const { data: { subscription } } = sb.auth.onAuthStateChange((_, session) => setUser(session?.user ?? null));
    return () => subscription.unsubscribe();
  }, []);

  // Keep sidebar incident badge in sync (solo COMGES)
  useEffect(() => {
    if (!user || framework !== 'comges') return;
    (async () => {
      const { count } = await sb.from('incidents').select('id', { count: 'exact', head: true })
        .eq('user_id', user.id).neq('status', 'Resuelto');
      setOpenInc(count || 0);
    })();
  }, [user, current, framework]);

  if (loading) return <Spinner full />;
  if (NOT_CONFIGURED) return <SetupScreen />;
  if (!user) return <LoginScreen onLogin={setUser} />;

  // Pantalla de selección de marco
  if (!framework) {
    return (
      <SelectionScreen
        user={user}
        onSelect={(fw) => { setFramework(fw); setCurrent('dashboard'); }}
        onLogout={() => sb.auth.signOut()}
      />
    );
  }

  // ISO: pantalla pendiente (con sidebar reducido para poder volver)
  if (framework === 'iso') {
    return (
      <div style={{ display: 'flex', height: '100%', width: '100%' }}>
        <Sidebar
          current="iso"
          onNavigate={() => {}}
          user={user}
          openIncidents={0}
          onLogout={() => sb.auth.signOut()}
          onChangeFramework={() => { setFramework(null); setDrawerOpen(false); }}
          isMobile={isMobile}
          isOpen={drawerOpen}
          onClose={() => setDrawerOpen(false)}
        />
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', minWidth: 0 }}>
          <Topbar title="ISO 27001" isMobile={isMobile} onMenuToggle={() => setDrawerOpen(true)} />
          <div style={{ flex: 1, padding: isMobile ? 16 : 28, overflowY: 'auto' }}>
            <IsoPendingScreen />
          </div>
        </div>
      </div>
    );
  }

  // COMGES: app completa
  const SCREENS = {
    dashboard:  { title: 'Panel de control',           comp: DashboardScreen },
    objectives: { title: 'Objetivos COMGES',           comp: ObjectivesScreen },
    incidents:  { title: 'Incidentes de seguridad',    comp: IncidentsScreen },
    evidence:   { title: 'Evidencias de cumplimiento', comp: EvidenceScreen },
    org:        { title: 'Configuración del organismo', comp: OrgScreen },
  };
  const { title, comp: Screen } = SCREENS[current] || SCREENS.dashboard;

  return (
    <div style={{ display: 'flex', height: '100%', width: '100%' }}>
      <Sidebar
        current={current}
        onNavigate={setCurrent}
        user={user}
        openIncidents={openInc}
        onLogout={() => sb.auth.signOut()}
        onChangeFramework={() => { setFramework(null); setDrawerOpen(false); }}
        isMobile={isMobile}
        isOpen={drawerOpen}
        onClose={() => setDrawerOpen(false)}
      />
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', minWidth: 0 }}>
        <Topbar title={title} isMobile={isMobile} onMenuToggle={() => setDrawerOpen(true)} />
        <div style={{ flex: 1, padding: isMobile ? 16 : 28, overflowY: 'auto' }}>
          <Screen userId={user.id} onNavigate={setCurrent} onHighlightEvidence={setHighlightEvidenceId} highlightEvidenceId={highlightEvidenceId} />
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
