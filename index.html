<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cyber-Sentinel · Panel COMGES</title>
  <!--
  ╔══════════════════════════════════════════════════════════════╗
  ║  CYBER-SENTINEL — APP FUNCIONAL CON SUPABASE                ║
  ║  Pasos para activar:                                        ║
  ║  1. Crea un proyecto en https://supabase.com               ║
  ║  2. Ve a SQL Editor y ejecuta el schema de abajo           ║
  ║  3. Reemplaza SUPABASE_URL y SUPABASE_ANON_KEY             ║
  ║  4. Crea usuarios en Authentication > Users                ║
  ║                                                             ║
  ║  SCHEMA SQL (ejecutar en Supabase > SQL Editor):           ║
  ║  ─────────────────────────────────────────────────────────  ║
  ║                                                             ║
  create table public.profiles (
    id uuid references auth.users(id) on delete cascade primary key,
    org_name text, org_region text, org_ciudad text,
    org_tipo_oiv text, org_nivel_complejidad text,
    org_usuarios_activos integer, org_equipo_seguridad integer,
    encargado_nombre text, encargado_correo text
  );
  create table public.objectives (
    id uuid default gen_random_uuid() primary key,
    user_id uuid references auth.users(id) on delete cascade not null,
    code text not null, name text not null,
    description text, plazo date, responsable text,
    created_at timestamptz default now()
  );
  create table public.tasks (
    id uuid default gen_random_uuid() primary key,
    objective_id uuid references public.objectives(id) on delete cascade not null,
    user_id uuid references auth.users(id) on delete cascade not null,
    name text not null, done boolean default false,
    created_at timestamptz default now()
  );
  create table public.incidents (
    id uuid default gen_random_uuid() primary key,
    user_id uuid references auth.users(id) on delete cascade not null,
    incident_number text, title text not null,
    description text, severity text default 'warn',
    sev_label text default 'Medio', status text default 'En detección',
    asset text, reported_by text, owner text,
    incident_date timestamptz default now(),
    created_at timestamptz default now()
  );
  create table public.evidence (
    id uuid default gen_random_uuid() primary key,
    user_id uuid references auth.users(id) on delete cascade not null,
    objective_code text, name text not null,
    format text default 'PDF', size text,
    status text default 'Pendiente', file_url text,
    created_at timestamptz default now()
  );
  alter table public.profiles enable row level security;
  alter table public.objectives enable row level security;
  alter table public.tasks enable row level security;
  alter table public.incidents enable row level security;
  alter table public.evidence enable row level security;
  create policy "own_profile" on public.profiles for all using (auth.uid() = id) with check (auth.uid() = id);
  create policy "own_objectives" on public.objectives for all using (auth.uid() = user_id) with check (auth.uid() = user_id);
  create policy "own_tasks" on public.tasks for all using (auth.uid() = user_id) with check (auth.uid() = user_id);
  create policy "own_incidents" on public.incidents for all using (auth.uid() = user_id) with check (auth.uid() = user_id);
  create policy "own_evidence" on public.evidence for all using (auth.uid() = user_id) with check (auth.uid() = user_id);
  ╚══════════════════════════════════════════════════════════════╝
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --azul-500: #2A6FDB; --azul-400: #4F84F2;
      --celeste-300: #66D4F7; --celeste-400: #38BFEC;
      --morado-500: #7C5CFC; --morado-300: #AB90FB;
      --navy-900: #060F2B; --navy-850: #0E2150;
      --text-strong: #F4F8FF; --text-body: #D5DEF2;
      --text-muted: #9CABCD; --text-faint: #6B7AA0;
      --surface-card: rgba(255,255,255,0.055);
      --surface-card-2: rgba(255,255,255,0.085);
      --border-subtle: rgba(255,255,255,0.08);
      --border-default: rgba(255,255,255,0.14);
      --success-300: #6EE7B7; --success-500: #10B981;
      --warning-300: #FCD77E; --warning-500: #F4B740;
      --danger-300: #FCA5B8; --danger-500: #F2566F;
      --grad-shield: linear-gradient(160deg, #4F84F2 0%, #7C5CFC 100%);
      --radius-md: 14px; --radius-lg: 20px; --radius-pill: 999px;
      --shadow-md: 0 8px 24px rgba(6,15,43,.40);
      --glow-azul: 0 0 0 1px rgba(86,194,240,.30), 0 6px 28px rgba(42,111,219,.45);
      --blur-glass: blur(18px) saturate(1.3);
    }
    body {
      background: linear-gradient(135deg, #060F2B 0%, #0A1A3F 45%, #070F2B 100%);
      color: var(--text-body); font-family: 'Manrope', sans-serif; min-height: 100vh;
    }
    #root { height: 100vh; display: flex; overflow: hidden; }
    [data-lucide] { width: 18px; height: 18px; display: inline-block; vertical-align: middle; }
    ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(6,15,43,.88);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; backdrop-filter: blur(6px);
    }
    input, textarea, select {
      background: rgba(255,255,255,0.07); border: 1px solid var(--border-default);
      border-radius: var(--radius-md); color: var(--text-strong);
      font-family: 'Manrope', sans-serif; font-size: 14px;
      padding: 10px 14px; width: 100%; outline: none; transition: border-color 150ms, box-shadow 150ms;
    }
    input:focus, textarea:focus, select:focus {
      border-color: var(--azul-400); box-shadow: 0 0 0 3px rgba(79,132,242,.18);
    }
    select option { background: #0E2150; color: var(--text-body); }
    textarea { resize: vertical; min-height: 80px; }
    input[type=checkbox] { width: auto; padding: 0; accent-color: var(--azul-400); cursor: pointer; }
    input[type=date]::-webkit-calendar-picker-indicator { filter: invert(0.7); cursor: pointer; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    .anim-fade { animation: fadeIn 0.18s ease; }

    /* ===== RESPONSIVE ===== */
    /* Colapsar grids de varias columnas a 1 columna en pantallas pequeñas */
    @media (max-width: 768px) {
      [style*="grid-template-columns"]:not(.dash-stat-grid):not(.sel-grid) {
        grid-template-columns: 1fr !important;
      }
      /* Inputs a 16px para evitar zoom automático en iOS */
      input, textarea, select { font-size: 16px !important; }
      /* Tablas con scroll horizontal */
      table { display: block; overflow-x: auto; white-space: nowrap; }
    }
    /* Tablet: grids de 3+ columnas pasan a 2 */
    @media (min-width: 769px) and (max-width: 1080px) {
      .sel-grid { grid-template-columns: repeat(2, 1fr) !important; }
    }
    /* Selection grid: 1 columna en móvil */
    @media (max-width: 600px) {
      .sel-grid { grid-template-columns: 1fr !important; }
    }

    /* ===== DASHBOARD RESPONSIVE ===== */
    /* Las filas del dashboard se apilan verticalmente en móvil */
    @media (max-width: 860px) {
      .dash-row { flex-direction: column !important; }
      .dash-row > * { min-width: 0 !important; width: 100% !important; }
      /* Anillos: reducir tamaño y permitir wrap del contenido */
      .dash-ring-card { gap: 18px !important; padding: 18px !important; }
      .dash-ring-card svg { width: 110px !important; height: 110px !important; }
      .dash-stat-grid { grid-template-columns: 1fr 1fr !important; width: 100%; }
    }
    @media (max-width: 420px) {
      .dash-ring-card { flex-direction: column !important; text-align: center; }
      .dash-ring-card svg { width: 130px !important; height: 130px !important; }
      .dash-stat-grid { grid-template-columns: 1fr 1fr !important; }
    }

    /* ===== EVIDENCIAS RESPONSIVE ===== */
    /* Fila de documento: permitir wrap en móvil para que los botones no se desborden */
    @media (max-width: 640px) {
      .ev-doc-row { flex-wrap: wrap !important; row-gap: 8px; }
      .ev-doc-row .ev-doc-info { flex: 1 1 100% !important; order: -1; }
      .ev-doc-actions { margin-left: auto; }
    }

    /* ===== OBJETIVOS RESPONSIVE ===== */
    /* La tarjeta de objetivo reorganiza anillo, info y acciones en móvil */
    @media (max-width: 640px) {
      .obj-row { flex-wrap: wrap !important; }
      .obj-ring { width: 64px !important; height: 64px !important; }
      .obj-info { flex: 1 1 calc(100% - 80px) !important; }
      /* Las acciones bajan a su propia línea, alineadas a la derecha */
      .obj-actions { flex: 1 1 100% !important; justify-content: flex-end; order: 3;
        border-top: 1px solid var(--border-subtle); padding-top: 8px; margin-top: 4px; }
      .obj-actions button { padding: 8px !important; }
    }

    /* ===== ORGANISMO RESPONSIVE ===== */
    /* El header apila avatar+info y baja los botones a su propia línea */
    @media (max-width: 640px) {
      .org-header { flex-wrap: wrap !important; gap: 16px !important; }
      .org-header-info { flex: 1 1 calc(100% - 96px) !important; }
      .org-header-actions { flex: 1 1 100% !important; }
      .org-header-actions button { flex: 1; justify-content: center; }
      /* El botón "Editar" (cuando va solo) ocupa todo el ancho */
      .org-header > button { flex: 1 1 100% !important; justify-content: center; }
    }
  </style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<script type="text/babel">
// ════════════════════════════════════════════════════
// ▸ CONFIGURACIÓN — Reemplaza con tus credenciales
// ════════════════════════════════════════════════════
const SUPABASE_URL      = 'https://knwqvmwoernhzqavyfzq.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtud3F2bXdvZXJuaHpxYXZ5ZnpxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExOTAyMzksImV4cCI6MjA5Njc2NjIzOX0.fUcqtcqKTDKlEOSfDTpCJG6usmwXt-K9RAJ5ydBrK9k';

// ════════════════════════════════════════════════════
// ▸ REACT + SUPABASE SETUP
// ════════════════════════════════════════════════════
const { useState, useEffect, useCallback, useRef } = React;
const NOT_CONFIGURED = SUPABASE_URL.includes('TU_PROYECTO');
const sb = NOT_CONFIGURED ? null : window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Call lucide after every render
setInterval(() => window.lucide?.createIcons(), 250);

// ════════════════════════════════════════════════════
// ▸ UTILS
// ════════════════════════════════════════════════════
const Ic = (name, style = {}) =>
  <i data-lucide={name} style={{ width: 18, height: 18, ...style }}></i>;

const CARD = {
  background: 'var(--surface-card)', border: '1px solid var(--border-subtle)',
  borderRadius: 'var(--radius-lg)', backdropFilter: 'var(--blur-glass)',
  padding: 20, boxShadow: 'var(--shadow-md)',
};

const getTone     = p => p >= 75 ? 'ok' : p >= 40 ? 'warn' : 'risk';
const TONE_COLOR  = { ok: 'var(--success-500)', warn: 'var(--warning-500)', risk: 'var(--danger-500)' };
const TONE_GRAD   = { ok: 'linear-gradient(90deg,#6EE7B7,#10B981)', warn: 'linear-gradient(90deg,#FCD77E,#F4B740)', risk: 'linear-gradient(90deg,#FCA5B8,#F2566F)' };
const TONE_STROKE = { ok: '#10B981', warn: '#F4B740', risk: '#F2566F' };
const SEV_LABEL   = { ok: 'Bajo', warn: 'Medio', risk: 'Crítico' };

const fmtDate = d => d ? new Date(d).toLocaleDateString('es-CL') : '—';

// ════════════════════════════════════════════════════
// ▸ UI PRIMITIVES
// ════════════════════════════════════════════════════

function Btn({ children, onClick, variant = 'primary', size = 'md', type = 'button', disabled = false, full = false, style: sx = {} }) {
  const base = {
    display: 'inline-flex', alignItems: 'center', gap: 7, cursor: disabled ? 'not-allowed' : 'pointer',
    border: 'none', borderRadius: 'var(--radius-md)', fontFamily: 'Manrope, sans-serif',
    fontWeight: 600, transition: 'all 150ms', opacity: disabled ? 0.55 : 1,
    width: full ? '100%' : undefined, justifyContent: full ? 'center' : undefined,
  };
  const SZ = {
    sm: { padding: '6px 12px', fontSize: 12 },
    md: { padding: '10px 18px', fontSize: 14 },
    lg: { padding: '13px 24px', fontSize: 15 },
  };
  const VA = {
    primary: { background: 'linear-gradient(135deg,var(--azul-500),var(--morado-500))', color: '#fff', boxShadow: 'var(--glow-azul)' },
    ghost:   { background: 'transparent', color: 'var(--text-muted)', border: '1px solid var(--border-default)' },
    danger:  { background: 'rgba(242,86,111,.16)', color: 'var(--danger-300)', border: '1px solid rgba(252,165,184,.32)' },
    success: { background: 'rgba(16,185,129,.16)', color: 'var(--success-300)', border: '1px solid rgba(110,231,183,.32)' },
  };
  return (
    <button type={type} onClick={onClick} disabled={disabled}
      style={{ ...base, ...SZ[size], ...VA[variant], ...sx }}>
      {children}
    </button>
  );
}

function Badge({ children, tone = 'ok', style: sx = {} }) {
  const C = {
    ok:   { bg: 'rgba(16,185,129,.16)', color: 'var(--success-300)', b: 'rgba(110,231,183,.3)' },
    warn: { bg: 'rgba(244,183,64,.16)', color: 'var(--warning-300)', b: 'rgba(252,215,126,.3)' },
    risk: { bg: 'rgba(242,86,111,.16)', color: 'var(--danger-300)', b: 'rgba(252,165,184,.3)' },
    azul: { bg: 'rgba(42,111,219,.16)', color: 'var(--azul-400)', b: 'rgba(79,132,242,.3)' },
    morado:{ bg: 'rgba(124,92,252,.16)', color: 'var(--morado-300)', b: 'rgba(171,144,251,.3)' },
  };
  const c = C[tone] || C.azul;
  return (
    <span style={{ padding: '3px 9px', borderRadius: 'var(--radius-pill)', fontSize: 11, fontWeight: 600,
      background: c.bg, color: c.color, border: `1px solid ${c.b}`, whiteSpace: 'nowrap', ...sx }}>
      {children}
    </span>
  );
}

function Field({ label, children }) {
  return (
    <div style={{ marginBottom: 16 }}>
      <label style={{ display: 'block', fontSize: 10.5, fontWeight: 700, color: 'var(--text-faint)',
        textTransform: 'uppercase', letterSpacing: '0.09em', marginBottom: 6 }}>
        {label}
      </label>
      {children}
    </div>
  );
}

function Modal({ title, onClose, children, width = 540 }) {
  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="anim-fade" style={{ ...CARD, width, maxHeight: '92vh', overflowY: 'auto', padding: 28 }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 24 }}>
          <h3 style={{ fontFamily: 'Space Grotesk, sans-serif', fontWeight: 600, fontSize: 18, color: 'var(--text-strong)' }}>{title}</h3>
          <button onClick={onClose}
            style={{ background: 'none', border: 'none', color: 'var(--text-faint)', cursor: 'pointer', padding: 4 }}>
            {Ic('x')}
          </button>
        </div>
        {children}
      </div>
    </div>
  );
}

function EmptyState({ icon, msg }) {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 12,
      padding: '48px 20px', color: 'var(--text-faint)' }}>
      {Ic(icon, { width: 36, height: 36, opacity: 0.35 })}
      <p style={{ fontSize: 14 }}>{msg}</p>
    </div>
  );
}

function Spinner({ full = false }) {
  const el = (
    <div style={{ width: 32, height: 32, border: '3px solid var(--border-subtle)',
      borderTop: '3px solid var(--azul-400)', borderRadius: '50%', animation: 'spin 0.8s linear infinite' }} />
  );
  if (!full) return <div style={{ display: 'flex', justifyContent: 'center', padding: 40 }}>{el}</div>;
  return <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100%', width: '100%' }}>{el}</div>;
}

function CsShieldLogo({ size = 32, gradId = 'cs-shield' }) {
  return (
    <svg width={size} height={size} viewBox="0 0 120 132" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id={gradId} x1="18" y1="8" x2="104" y2="124" gradientUnits="userSpaceOnUse">
          <stop offset="0" stopColor="#66D4F7"/><stop offset="0.5" stopColor="#2A6FDB"/><stop offset="1" stopColor="#7C5CFC"/>
        </linearGradient>
      </defs>
      <path d="M60 4 L106 20 V64 C106 96 86 118 60 128 C34 118 14 96 14 64 V20 Z" fill={`url(#${gradId})`}/>
      <path d="M60 16 L96 28.5 V64 C96 89.5 80.5 107.5 60 116 C39.5 107.5 24 89.5 24 64 V28.5 Z" fill="#0E2150"/>
      <circle cx="60" cy="60" r="13" fill="none" stroke="#66D4F7" strokeWidth="3.5"/>
      <circle cx="60" cy="60" r="4.5" fill="#AB90FB"/>
    </svg>
  );
}

// ════════════════════════════════════════════════════
// ▸ SETUP SCREEN (credenciales no configuradas)
// ════════════════════════════════════════════════════
function SetupScreen() {
  return (
    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100vh', width: '100%', padding: 20 }}>
      <div style={{ ...CARD, maxWidth: 580, padding: 40, textAlign: 'center' }}>
        <CsShieldLogo size={56} gradId="setup-shield" />
        <h2 style={{ fontFamily: 'Space Grotesk, sans-serif', fontWeight: 700, fontSize: 22, color: 'var(--text-strong)', marginTop: 16 }}>
          Configura Supabase
        </h2>
        <p style={{ color: 'var(--text-muted)', fontSize: 14, lineHeight: 1.6, marginTop: 10, marginBottom: 28 }}>
          Para activar la app, reemplaza <code style={{ fontFamily: 'JetBrains Mono, monospace', color: 'var(--celeste-300)', fontSize: 12 }}>SUPABASE_URL</code> y{' '}
          <code style={{ fontFamily: 'JetBrains Mono, monospace', color: 'var(--celeste-300)', fontSize: 12 }}>SUPABASE_ANON_KEY</code>{' '}
          al inicio del archivo HTML con las credenciales de tu proyecto.
        </p>
        <div style={{ textAlign: 'left', display: 'flex', flexDirection: 'column', gap: 14 }}>
          {[
            ['1', 'folder-open', 'Crea un proyecto en supabase.com (gratis)'],
            ['2', 'database', 'Ve a SQL Editor y ejecuta el schema del comentario al inicio del HTML'],
            ['3', 'key', 'Copia URL y anon key desde Project Settings → API'],
            ['4', 'code', 'Pégalos en las constantes SUPABASE_URL y SUPABASE_ANON_KEY'],
            ['5', 'user-plus', 'Crea usuarios en Authentication → Users'],
          ].map(([n, icon, text]) => (
            <div key={n} style={{ display: 'flex', gap: 14, alignItems: 'flex-start' }}>
              <div style={{ width: 28, height: 28, borderRadius: '50%', background: 'var(--grad-shield)', flexShrink: 0,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontFamily: 'Space Grotesk, sans-serif', fontWeight: 700, fontSize: 12, color: '#fff' }}>{n}</div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 10, paddingTop: 4 }}>
                <span style={{ color: 'var(--celeste-300)' }}>{Ic(icon, { width: 16, height: 16 })}</span>
                <span style={{ fontSize: 13.5, color: 'var(--text-body)' }}>{text}</span>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════
// ▸ LOGIN SCREEN
// ════════════════════════════════════════════════════
function LoginScreen({ onLogin }) {
  const [email, setEmail] = useState('');
  const [pwd, setPwd]     = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError]     = useState('');

  const handleSubmit = async (e) => {
    e.preventDefault();
    setError(''); setLoading(true);
    const { data, error: err } = await sb.auth.signInWithPassword({ email, password: pwd });
    setLoading(false);
    if (err) { setError(err.message); return; }
    onLogin(data.user);
  };

  return (
    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100vh', width: '100%' }}>
      <div className="anim-fade" style={{ ...CARD, width: 420, padding: 40 }}>
        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 12, marginBottom: 36 }}>
          <CsShieldLogo size={60} gradId="login-shield" />
          <div style={{ textAlign: 'center' }}>
            <h1 style={{ fontFamily: 'Space Grotesk, sans-serif', fontWeight: 700, fontSize: 24, color: 'var(--text-strong)' }}>
              Cyber-Sentinel
            </h1>
            <p style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 10, color: 'var(--text-faint)', marginTop: 5, letterSpacing: '0.12em' }}>
              COMGES · SALUD · CUMPLIMIENTO
            </p>
          </div>
        </div>

        <form onSubmit={handleSubmit}>
          <Field label="Correo electrónico">
            <input type="email" value={email} onChange={e => setEmail(e.target.value)}
              placeholder="correo@organismo.cl" required autoComplete="email" />
          </Field>
          <Field label="Contraseña">
            <input type="password" value={pwd} onChange={e => setPwd(e.target.value)}
              placeholder="••••••••" required autoComplete="current-password" />
          </Field>
          {error && (
            <div style={{ padding: '10px 14px', background: 'rgba(242,86,111,.12)',
              border: '1px solid rgba(252,165,184,.3)', borderRadius: 'var(--radius-md)',
              color: 'var(--danger-300)', fontSize: 13, marginBottom: 14 }}>
              {error}
            </div>
          )}
          <Btn type="submit" disabled={loading} full style={{ marginTop: 8 }}>
            {loading ? 'Ingresando…' : 'Iniciar sesión'}
          </Btn>
        </form>
      </div>
    </div>
  );
}
